<script>
// All game code lives inside boot(), called once Firebase loads
function boot(dbSet, dbGet, dbOn) {

  // ── Constants ──────────────────────────────────────────────────────────────
  var PC = ["#c0392b","#2471a3","#1e8449","#d68910","#6c3483","#117a65"];
  var BW=1300, BH=980, OL=140, OR=1160, OT=130, OB=850, SW=52, SH=52;
  var WIN_IDX = 33;

  var BOATS = [
    {name:"Dinghy",price:15},{name:"Kayak",price:20},{name:"Skiff",price:25},
    {name:"Cruiser",price:40},{name:"Catamaran",price:50},{name:"Yacht",price:60}
  ];
  var SWSP = [3,9,16,28];
  var SKSP = [6,23,30];

  var TASKS = {
    boat_school: {
      key:"boat_school",label:"Boat School",entryIdx:5,exitIdx:6,count:6,colGap:SW,color:"#5b2c8c",
      spaces:[
        {story:"You ace a test drive!",         eff:function(p){return mg(p,{stars:p.stars+1});},                  desc:"+1 star",reward:1},
        {story:"F on nav test.",                eff:function(p){return mg(p,{stars:Math.max(0,p.stars-1)});},      desc:"-1 star",reward:-1},
        {story:"New friends at sailing camp!",  eff:function(p){return mg(p,{stars:p.stars+1});},                  desc:"+1 star",reward:1},
        {story:"Fell asleep in class.",         eff:function(p){return mg(p,{stars:Math.max(0,p.stars-1)});},      desc:"-1 star",reward:-1},
        {story:"You learn to tow water skiers!",eff:function(p){return mg(p,{stars:p.stars+2});},                  desc:"+2 stars",reward:2},
        {story:"You pass your final exam!",     eff:function(p){return mg(p,{stars:p.stars+1});},                  desc:"+1 star",reward:1}
      ],
      req:function(p){return p.stars>=(p.shortcut&&p.shortcut.stars?2:3);},
      done:"Graduated",
      prog:function(p){return "Stars: "+p.stars+"/"+(p.shortcut&&p.shortcut.stars?2:3);}
    },
    boat: {
      key:"boat",label:"The Boat Store",entryIdx:12,exitIdx:13,count:6,colGap:SW,color:"#b7600a",
      spaces:[],req:function(p){return p.boat!==null;},done:null,prog:function(){return "No boat yet";}
    },
    fish: {
      key:"fish",label:"Catch a Fish",entryIdx:19,exitIdx:20,count:8,colGap:SW,color:"#0e6655",
      spaces:[
        {story:"Great fishing spot!",          eff:function(p){return mg(p,{fish:p.fish+3});},desc:"+3 fish",reward:3},
        {story:"Bad stream.",                  eff:function(p){return p;},                    desc:"Empty.",reward:0},
        {story:"Sister teaches bait tricks!",  eff:function(p){return mg(p,{fish:p.fish+6});},desc:"+6 fish",reward:6},
        {story:"Just one nibble.",             eff:function(p){return mg(p,{fish:p.fish+1});},desc:"+1 fish",reward:1},
        {story:"Wake up at dawn, worth it!",   eff:function(p){return mg(p,{fish:p.fish+4});},desc:"+4 fish",reward:4},
        {story:"Sailor shares his spot.",      eff:function(p){return mg(p,{fish:p.fish+2});},desc:"+2 fish",reward:2},
        {story:"Jackpot! Fish are jumping.",   eff:function(p){return mg(p,{fish:p.fish+5});},desc:"+5 fish",reward:5},
        {story:"Your line snaps.",             eff:function(p){return p;},                    desc:"Got away.",reward:0}
      ],
      req:function(p){return p.fish>=(p.shortcut&&p.shortcut.fish?6:10);},
      done:"Expert Fisherman",
      prog:function(p){return "Fish: "+p.fish+"/"+(p.shortcut&&p.shortcut.fish?6:10);}
    },
    rescue: {
      key:"rescue",label:"Lets Rescue!",entryIdx:26,exitIdx:27,count:6,colGap:SW,color:"#1a5276",
      spaces:[
        {story:"You perform CPR!",             eff:function(p){return mg(p,{rescues:p.rescues+1});},                  desc:"+1",reward:1},
        {story:"Swimmer got away.",            eff:function(p){return p;},                                            desc:"None.",reward:0},
        {story:"Rescue someone who tips you!", eff:function(p){return mg(p,{rescues:p.rescues+1,money:p.money+20});}, desc:"+1+$20",reward:1},
        {story:"Rescued person fell back in!", eff:function(p){return mg(p,{rescues:Math.max(0,p.rescues-1)});},      desc:"-1",reward:-1},
        {story:"Save two from rip current!",   eff:function(p){return mg(p,{rescues:p.rescues+2});},                  desc:"+2",reward:2},
        {story:"Conditions too rough.",        eff:function(p){return p;},                                            desc:"None.",reward:0}
      ],
      req:function(p){return p.rescues>=(p.shortcut&&p.shortcut.rescues?1:2);},
      done:"Life Saver",
      prog:function(p){return "Rescues: "+p.rescues+"/"+(p.shortcut&&p.shortcut.rescues?1:2);}
    }
  };

  var JMAP = {5:"boat_school",12:"boat",19:"fish",26:"rescue",33:"winner"};
  var WDOCK = [
    {label:"Dock 1",   eff:function(p){return p;}},
    {label:"Lose Turn",eff:function(p){return mg(p,{skip:(p.skip||0)+1});}},
    {label:"Back 1",   eff:function(p){return mg(p,{winPos:Math.max(0,(p.winPos||0)-1)});}},
    {label:"WIN",      eff:function(p){return p;},win:true}
  ];
  var SCARDS = [
    {id:"s1",text:"Fair winds! Move +3.",eff:{move:3}},{id:"s2",text:"Wallet found! +$20.",eff:{money:20}},
    {id:"s3",text:"Smooth sailing! Move +2.",eff:{move:2}},{id:"s4",text:"Sponsorship! +$25.",eff:{money:25}},
    {id:"s5",text:"Crew tip! +$15.",eff:{money:15}},{id:"s6",text:"Current! Move +4.",eff:{move:4}},
    {id:"s7",text:"Weather bonus! +$12.",eff:{money:12}},{id:"s8",text:"Sailor tips you! +$8.",eff:{money:8}},
    {id:"s9",text:"Harbor festival! +$18.",eff:{money:18}},{id:"s10",text:"Tailwind! Move +1.",eff:{move:1}},
    {id:"s11",text:"Regatta prize! +$30.",eff:{money:30}},{id:"s12",text:"Sold gear! +$10.",eff:{money:10}}
  ];
  var KCARDS = [
    {id:"k1",text:"Storm! Go back 3.",eff:{move:-3}},{id:"k2",text:"Docking fee. -$8.",eff:{money:-8}},
    {id:"k3",text:"Maintenance! -$5.",eff:{money:-5}},{id:"k4",text:"Rogue wave! Back 2.",eff:{move:-2}},
    {id:"k5",text:"Customs! -$7.",eff:{money:-7}},{id:"k6",text:"Fog delay, skip turn.",eff:{skip:1}},
    {id:"k7",text:"Engine trouble! -$10.",eff:{money:-10}},{id:"k8",text:"Fine! -$12.",eff:{money:-12}},
    {id:"k9",text:"Wave! Back 1.",eff:{move:-1}},{id:"k10",text:"Anchor stuck! Skip turn.",eff:{skip:1}},
    {id:"k11",text:"Nav error! Back 2.",eff:{move:-2}},{id:"k12",text:"Fuel leak! -$6.",eff:{money:-6}}
  ];
  var SWDEFS = [
    {type:"robbery", icon:"[R]",label:"Highway Robbery",desc:"Take ALL money from any one player.",copies:5},
    {type:"shortcut",icon:"[S]",label:"Shortcut",       desc:"Reduce one challenge requirement.",copies:5},
    {type:"teleport",icon:"[T]",label:"Teleportation",  desc:"Jump to any space on the oval.",   copies:5},
    {type:"freeze",  icon:"[F]",label:"Freeze Frame",   desc:"Target skips their next 2 turns.", copies:5},
    {type:"double",  icon:"[D]",label:"Double Time",    desc:"2 bonus rolls this turn.",         copies:5},
    {type:"fasttrack",icon:"[!]",label:"Fast Track",    desc:"No exact roll needed to WIN. Auto-active.",copies:1}
  ];

  // ── Helpers ────────────────────────────────────────────────────────────────
  function mg(a,b){var r={};for(var k in a)r[k]=a[k];for(var k in b)r[k]=b[k];return r;}
  function dc(o){return JSON.parse(JSON.stringify(o));}
  function shuf(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}
  function mkSwim(){return shuf(SCARDS.concat(SCARDS).concat(SCARDS));}
  function mkSink(){return shuf(KCARDS.concat(KCARDS).concat(KCARDS));}
  function mkDeck(defs){
    var d=[];
    for(var i=0;i<defs.length;i++){
      for(var j=0;j<defs[i].copies;j++){
        d.push(mg(defs[i],{uid:Math.random().toString(36).slice(2)}));
      }
    }
    return shuf(d);
  }
  function mkP(id,name,color,isAI,diff){
    return {id:id,name:name,color:color,isAI:!!isAI,aiDiff:diff||null,
      pos:0,money:35,stars:0,graduated:false,rescues:0,fish:0,boat:null,skip:0,
      inTask:null,taskPos:-1,winPos:-1,done:false,eliminated:false,
      heldCards:[],shortcut:{fish:false,rescues:false,stars:false},fasttrack:false,
      doubleRollsLeft:0,completedTasks:[],frozen:0,frozenBy:null,
      boughtCardThisTurn:false,usedShipwreckThisTurn:false,cardsBoughtThisTurn:[]};
  }

  // ── Geometry ───────────────────────────────────────────────────────────────
  function oPos(i){
    if(i<10)return{x:OL+(i/9)*(OR-OL),y:OB};
    if(i<18)return{x:OR,y:OB-((i-10)/7)*(OB-OT)};
    if(i<28)return{x:OR-((i-18)/9)*(OR-OL),y:OT};
    return{x:OL,y:OT+((i-28)/7)*(OB-OT)};
  }
  function jDir(ei){if(ei<10)return{x:0,y:-1};if(ei<18)return{x:-1,y:0};if(ei<28)return{x:0,y:1};return{x:1,y:0};}
  function jPerp(ei){if(ei<10)return{x:1,y:0};if(ei<18)return{x:0,y:1};if(ei<28)return{x:-1,y:0};return{x:0,y:-1};}
  function jut2col(ei,count,cg){
    var base=oPos(ei),d=jDir(ei),p=jPerp(ei),half=Math.ceil(count/2),pts=[];
    for(var i=0;i<half;i++)pts.push({x:base.x+d.x*(i+1)*SW-p.x*cg/2,y:base.y+d.y*(i+1)*SW-p.y*cg/2});
    for(var i=half-1;i>=0&&pts.length<count;i--)pts.push({x:base.x+d.x*(i+1)*SW+p.x*cg/2,y:base.y+d.y*(i+1)*SW+p.y*cg/2});
    return pts;
  }
  function buildJC(){
    var c={};
    var keys=Object.keys(TASKS);
    for(var ki=0;ki<keys.length;ki++){
      var t=TASKS[keys[ki]],cg=t.colGap||SW;
      var pts=jut2col(t.entryIdx,t.count,cg);
      var p=jPerp(t.entryIdx),base=oPos(t.entryIdx);
      var ep={x:base.x-p.x*cg/2,y:base.y-p.y*cg/2};
      var cl=pts[pts.length-1];
      var xp=t.key==="boat"?{x:ep.x,y:cl.y}:{x:cl.x,y:ep.y};
      c[t.key]={pts:pts,ep:ep,xp:xp};
    }
    var wd=jDir(WIN_IDX),wb=oPos(WIN_IDX),wp=[];
    for(var i=0;i<4;i++)wp.push({x:wb.x+wd.x*(i+1)*SW,y:wb.y+wd.y*(i+1)*SW});
    c.winner={pts:wp,ep:wb,xp:null};
    return c;
  }
  function sKind(i){
    if(i===0)return"start";
    if(SWSP.indexOf(i)>=0)return"swim";
    if(SKSP.indexOf(i)>=0)return"sink";

  // ── Lobby ──────────────────────────────────────────────────────────────────
  function genCode(){return String(Math.floor(1000+Math.random()*9000));}

  function createRoom(){
    var code=genCode();
    rCode=code;isHost=true;myId=0;isMulti=true;
    var p0=mkP(0,"Player 1",PC[0],false,null);
    var s={players:[p0,null],curIdx:0,phase:"waiting",log:[],
      swimDeck:mkSwim(),sinkDeck:mkSink(),swDeck:mkDeck(SWDEFS),winner:null};
    dbSet("rooms/"+code,s).then(function(){
      document.getElementById("cs").style.display="block";
      document.getElementById("ccode").textContent=code;
      rUnsub=dbOn("rooms/"+code,function(v){
        if(!v)return;
        updateSlots(v.players);
        if(v.players&&v.players[1]&&v.phase==="waiting"){
          var b=document.getElementById("cbadge");
          b.className="badge bok";
          b.textContent="Opponent joined! Starting...";
          setTimeout(function(){enterGame(code);},1500);
        }
      });
    }).catch(function(e){alert("Error creating room: "+e.message);});
  }

  function joinRoom(){
    var code=document.getElementById("ji").value.trim().toUpperCase();
    if(code.length!==4){setBadge("j","Enter 4-digit code","berr");return;}
    dbGet("rooms/"+code).then(function(v){
      if(!v){setBadge("j","Room not found","berr");return;}
      if(v.players&&v.players[1]){setBadge("j","Room is full","berr");return;}
      rCode=code;isHost=false;myId=1;isMulti=true;
      var p1=mkP(1,"Player 2",PC[1],false,null);
      dbSet("rooms/"+code+"/players/1",p1).then(function(){
        setBadge("j","Joined! Starting...","bok");
        setTimeout(function(){enterGame(code);},1500);
      });
    }).catch(function(e){setBadge("j","Error: "+e.message,"berr");});
  }

  function drawOval(svg){
    var exits={};
    var tkeys=Object.keys(TASKS);
    for(var ki=0;ki<tkeys.length;ki++)exits[TASKS[tkeys[ki]].exitIdx]=true;
    for(var i=0;i<36;i++){
      var pos=oPos(i),x=pos.x,y=pos.y;
      var k=sKind(i),isEnt=k.indexOf("entry_")===0,isEx=exits[i];
      for(var ki=0;ki<tkeys.length;ki++){
        var t=TASKS[tkeys[ki]];
        if(i===t.entryIdx){var p=jPerp(t.entryIdx);x-=p.x*(t.colGap||SW)/2;y-=p.y*(t.colGap||SW)/2;break;}
      }
      var fill=isEx?"#c8a96e":sColor(k);
      var rx=(isEnt||k==="start")?8:5;
      var g=mkEl("g",{id:"sp"+i});
      g.appendChild(mkEl("rect",{x:x-SW/2,y:y-SH/2,width:SW,height:SH,rx:rx,fill:fill,stroke:k==="start"?"#7dff9a":"#ffffffa0","stroke-width":k==="start"?2:0.8}));
      if(k==="start"){
        g.appendChild(mkEl("rect",{x:x-SW/2+3,y:y-SH/2+3,width:SW-6,height:SH-6,rx:5,fill:"none",stroke:"#ffffff40","stroke-width":1}));
        g.appendChild(mkTxt("START",{x:x,y:y,"text-anchor":"middle","dominant-baseline":"central","font-size":9,fill:"#7dff9a","font-weight":"bold"}));
      } else if(k==="swim"){
        g.appendChild(mkTxt("SWIM",{x:x,y:y,"text-anchor":"middle","dominant-baseline":"central","font-size":8,fill:"#fff"}));
      } else if(k==="sink"){
        g.appendChild(mkTxt("SINK",{x:x,y:y,"text-anchor":"middle","dominant-baseline":"central","font-size":8,fill:"#fff"}));
      } else if(k==="entry_winner"){
        g.appendChild(mkTxt("WIN",{x:x,y:y,"text-anchor":"middle","dominant-baseline":"central","font-size":11,fill:"#fff","font-weight":"bold"}));
      }
      svg.appendChild(g);
    }
  }

  function pXY(pl){
    if(pl.winPos>=0){var pts=JC.winner?JC.winner.pts:[];if(pts[pl.winPos])return pts[pl.winPos];}
    if(pl.inTask){var jd=JC[pl.inTask];if(jd){if(pl.taskPos>=0&&jd.pts[pl.taskPos])return jd.pts[pl.taskPos];return jd.ep||oPos(TASKS[pl.inTask].entryIdx);}}
    return oPos(pl.pos);
  }

  function updateTok(s){
    var layer=document.getElementById("tlayer");if(!layer)return;
    layer.innerHTML="";
    var groups={};
    for(var i=0;i<s.players.length;i++){
      var pl=s.players[i];if(!pl||pl.eliminated)continue;
      var xy=pXY(pl),k=Math.round(xy.x)+","+Math.round(xy.y);
      if(!groups[k])groups[k]=[];
      groups[k].push({pl:pl,pi:i});
    }
    var gkeys=Object.keys(groups);
    for(var gi=0;gi<gkeys.length;gi++){
      var grp=groups[gkeys[gi]],pts2=gkeys[gi].split(",");
      var bx=parseFloat(pts2[0]),by=parseFloat(pts2[1]);
      for(var oi=0;oi<grp.length;oi++){
        var pl=grp[oi].pl,pi=grp[oi].pi,act=pi===s.curIdx;
        var ox=grp.length>1?(oi-(grp.length-1)/2)*28:0;
        var oy=grp.length>1?-oi*6:0;
        var g=mkEl("g",{transform:"translate("+(bx+ox)+","+(by+oy)+")"});
        if(act){
          g.appendChild(mkEl("circle",{cx:0,cy:-14,r:18,fill:"none",stroke:"#FFD700","stroke-width":3,opacity:0.8}));
          g.appendChild(mkEl("circle",{cx:0,cy:-14,r:22,fill:"none",stroke:"#FFD700","stroke-width":1.5,opacity:0.4}));
        }
        g.appendChild(mkEl("rect",{x:-8,y:-4,width:16,height:20,rx:4,fill:pl.color}));
        g.appendChild(mkEl("circle",{cx:0,cy:-12,r:8,fill:"#FDDBB4"}));
        g.appendChild(mkEl("rect",{x:-9,y:-22,width:18,height:8,rx:2,fill:"#1a2a4a"}));
        g.appendChild(mkEl("rect",{x:-9,y:-16,width:18,height:2,fill:"#FFD700"}));
        g.appendChild(mkEl("rect",{x:-7,y:16,width:6,height:10,rx:2,fill:"#1a2a4a"}));
        g.appendChild(mkEl("rect",{x:1,y:16,width:6,height:10,rx:2,fill:"#1a2a4a"}));
        var ws=pl.name.split(" ");
        for(var wi=0;wi<ws.length;wi++){
          g.appendChild(mkTxt(ws[wi],{x:0,y:30+wi*10,"text-anchor":"middle","dominant-baseline":"central","font-size":8,fill:"#fff","font-weight":"bold",stroke:"#000","stroke-width":0.6,"paint-order":"stroke"}));
        }
        layer.appendChild(g);
      }
    }
  }

  // ── Game logic ──────────────────────────────────────────────────────────────
  function addL(s,m){
    if(!s.log)s.log=[];
    if(Array.isArray(s.log))s.log=[m].concat(s.log).slice(0,60);
    else s.log=[m];
  }

  function posD(pl){
    if(pl.winPos>=0){var l=["Dock 1","Lose Turn","Back 1","WIN"];return"Winners Dock: "+(l[pl.winPos]||"");}
    if(pl.inTask==="boat")return"Boat Store: sp "+(pl.taskPos+1);
    if(pl.inTask)return(TASKS[pl.inTask]?TASKS[pl.inTask].label:pl.inTask)+": sp "+(pl.taskPos+1);
    return null;
  }

  function tLine(pl,tk){
    var done=(pl.completedTasks||[]).indexOf(tk)>=0;
    if(tk==="boat"){if(done)return{t:"Boat: "+(pl.boat?pl.boat.name:"?"),g:true};return{t:"No boat yet",g:false};}
    var t=TASKS[tk];if(!t)return{t:"",g:false};
    if(done)return{t:t.label+": done",g:true};
    return{t:t.prog(pl),g:t.req(pl)};
  }

  function doRoll(){
    if(!GS)return;
    var s=dc(GS),pl=s.players[s.curIdx];
    if((pl.doubleRollsLeft||0)>0)pl.doubleRollsLeft--;
    s.phase="rolling";
    var r=Math.ceil(Math.random()*6);
    addL(s,pl.name+" rolls "+r);
    s.players[s.curIdx]=pl;
    push(s);
    processRoll(r,s);
  }

  function processRoll(r,s){
    var pl=s.players[s.curIdx];
    if(pl.skip>0){s.players[s.curIdx]=mg(pl,{skip:pl.skip-1});addL(s,pl.name+" skips.");advTurn(s);return;}
    if(pl.winPos>=0){doWin(pl,s,r);return;}
    if(pl.inTask==="boat"){doBoat(pl,s,r);return;}
    if(pl.inTask){doTask(pl,s,r);return;}
    doMove(pl,s,r);
  }

  function doMove(pl,s,r){
    var path=[];for(var i=1;i<=r;i++)path.push((pl.pos+i)%36);
    var fc=pl.completedTasks||[];
    var jes=[
      {idx:TASKS.boat_school.entryIdx,key:"boat_school",need:fc.indexOf("boat_school")<0},
      {idx:TASKS.boat.entryIdx,key:"boat",need:fc.indexOf("boat")<0},
      {idx:TASKS.fish.entryIdx,key:"fish",need:fc.indexOf("fish")<0},
      {idx:TASKS.rescue.entryIdx,key:"rescue",need:fc.indexOf("rescue")<0},
      {idx:WIN_IDX,key:"winner",need:fc.length>=4}
    ];
    var ss=r,jh=null;
    for(var i=0;i<path.length&&!jh;i++){
      for(var j=0;j<jes.length;j++){
        if(jes[j].need&&jes[j].idx===path[i]){ss=i+1;jh=jes[j];break;}
      }
    }
    var sp=path[ss-1],extra=r-ss;
    var u=mg(pl,{pos:sp});
    var passed=false;
    for(var i=0;i<ss;i++)if(path[i]===0&&pl.pos!==0){passed=true;break;}
    if(passed){u=mg(u,{money:u.money+5});addL(s,"Passed START! +$5");}
    s.players[s.curIdx]=u;
    if(jh){if(extra>0)enterJutX(u,s,jh.key,extra);else enterJut(u,s,jh.key);}
    else landOn(u,s);
  }

  function landOn(pl,s){
    var k=sKind(pl.pos);
    if(k==="swim"){
      var deck=(s.swimDeck||[]).slice();if(!deck.length)deck=mkSwim();
      var card=deck[0];deck=deck.slice(1);s.swimDeck=deck;
      var u=mg(pl,{});
      if(card.eff.money)u=mg(u,{money:u.money+card.eff.money});
      if(card.eff.skip)u=mg(u,{skip:(u.skip||0)+card.eff.skip});
      var mv=card.eff.move||0;
      s.players[s.curIdx]=u;addL(s,u.name+": "+card.text);
      var sc2=dc(s);
      showP("Swim Card!","swim",card.text,[{l:"Woohoo!",c:"pp",fn:function(){
        if(mv!==0){var fp=((u.pos+mv+360*10)%36);var um=mg(u,{pos:fp});sc2.players[sc2.curIdx]=um;push(sc2);landOn(um,sc2);}
        else advTurn(sc2);
      }}]);
      push(s);return;
    }
    if(k==="sink"){
      var deck2=(s.sinkDeck||[]).slice();if(!deck2.length)deck2=mkSink();
      var card2=deck2[0];deck2=deck2.slice(1);s.sinkDeck=deck2;
      var u2=mg(pl,{});
      if(card2.eff.money)u2=mg(u2,{money:u2.money+card2.eff.money});
      if(card2.eff.skip)u2=mg(u2,{skip:(u2.skip||0)+card2.eff.skip});
      var mv2=card2.eff.move||0;
      s.players[s.curIdx]=u2;addL(s,u2.name+": "+card2.text);
      var sc3=dc(s);
      showP("Sink Card!","sink",card2.text,[{l:"Yikes...",c:"pn",fn:function(){
        if(mv2!==0){var fp2=((u2.pos+mv2+360*10)%36);var um2=mg(u2,{pos:fp2});sc3.players[sc3.curIdx]=um2;push(sc3);landOn(um2,sc3);}
        else advTurn(sc3);
      }}]);
      push(s);return;
    }
    advTurn(s);
  }

  function enterJut(pl,s,key){
    if(key==="winner"){
      if(pl.money<0){showP("Wallet Too Low!","debt","Need $0+ to enter!\nBalance: $"+pl.money,[{l:"Dang!",c:"pp",fn:function(){advTurn(s);}}]);return;}
      s.players[s.curIdx]=mg(pl,{winPos:-1});
      showP("Winners Dock!","info","All 4 done!\nRoll exact number to reach WIN!",[{l:"Lets go!",c:"pp",fn:function(){advTurn(s);}}]);
      push(s);return;
    }
    if(key==="boat"&&!pl.graduated){
      if(pl.isAI){
        if(Math.random()<0.3&&pl.money>-50){s.players[s.curIdx]=mg(pl,{money:pl.money-100,inTask:"boat",taskPos:-1});addL(s,"AI pays $100 bypass");push(s);advTurn(s);}
        else{addL(s,"AI skips Boat Store");push(s);advTurn(s);}
        return;
      }
      showP("The Boat Store!","info","Need to graduate first!\nPay $100 to bypass, or skip.\nBalance: $"+pl.money,[
        {l:"Pay $100 and Shop",c:"pw",fn:function(){var s2=dc(GS);s2.players[s2.curIdx]=mg(s2.players[s2.curIdx],{money:s2.players[s2.curIdx].money-100,inTask:"boat",taskPos:-1});push(s2);advTurn(s2);}},
        {l:"Skip",c:"pn",fn:function(){advTurn(dc(GS));}}
      ]);
      return;
    }
    s.players[s.curIdx]=mg(pl,{inTask:key,taskPos:-1});
    addL(s,pl.name+" enters "+(TASKS[key]?TASKS[key].label:key)+"!");
    push(s);advTurn(s);
  }

  function enterJutX(pl,s,key,extra){
    if(key==="winner"){
      if(pl.money<0){showP("Wallet Too Low!","debt","Need $0+ to enter!",[{l:"Dang!",c:"pp",fn:function(){advTurn(s);}}]);return;}
      s.players[s.curIdx]=mg(pl,{winPos:-1});push(s);doWin(s.players[s.curIdx],s,extra);return;
    }
    if(key==="boat"&&!pl.graduated){enterJut(pl,s,"boat");return;}
    s.players[s.curIdx]=mg(pl,{inTask:key,taskPos:-1});
    addL(s,pl.name+" enters "+(TASKS[key]?TASKS[key].label:key)+"!");
    push(s);doTask(s.players[s.curIdx],s,extra);
  }

  function doTask(pl,s,r){
    var t=TASKS[pl.inTask],np=pl.taskPos+r;
    if(np>=t.count){
      var rem=r-(t.count-1-pl.taskPos)-1;
      var u=mg(pl,{inTask:null,taskPos:-1,pos:t.exitIdx});
      var comp=t.req(u)&&(u.completedTasks||[]).indexOf(t.key)<0;
      if(comp){
        u=mg(u,{completedTasks:(u.completedTasks||[]).concat([t.key])});
        if(t.key==="boat_school")u=mg(u,{graduated:true});
        addL(s,"Completed "+t.label+"!");
      }
      s.players[s.curIdx]=u;
      var body=comp?(u.completedTasks.length+"/4 done!"):t.prog(u);
      var sc4=dc(s),uc=dc(u);
      showP(comp?"Done!":"Exited "+t.label,comp?"success":"info",body,[{l:comp?"Yes!":"Continue",c:"pp",fn:function(){
        if(rem>0){var fp3=(t.exitIdx+rem)%36;var um3=mg(uc,{pos:fp3});sc4.players[sc4.curIdx]=um3;push(sc4);landOn(um3,sc4);}
        else advTurn(sc4);
      }}]);
      push(s);return;
    }
    var u2=mg(pl,{taskPos:np}),space=t.spaces[np];
    if(space)u2=space.eff(u2);
    s.players[s.curIdx]=u2;
    addL(s,pl.name+" -> "+t.label+" sp"+(np+1)+": "+(space?space.desc:""));
    var sc5=dc(s);
    showP(t.label,"info",space?(space.story+"\n\n"+space.desc):t.prog(u2),[{l:"Continue",c:"pp",fn:function(){advTurn(sc5);}}]);
    push(s);
  }

  function doBoat(pl,s,r){
    var np=pl.taskPos+r;
    if(np>=BOATS.length){s.players[s.curIdx]=mg(pl,{inTask:null,taskPos:-1,pos:TASKS.boat.exitIdx});push(s);advTurn(s);return;}
    var u=mg(pl,{taskPos:np}),boat=BOATS[np];
    var sold=false;
    for(var i=0;i<s.players.length;i++){
      if(i!==s.curIdx&&s.players[i]&&s.players[i].boat&&s.players[i].boat.name===boat.name){sold=true;break;}
    }
    s.players[s.curIdx]=u;
    if(sold){showP(boat.name+" Sold","info","Already sold!",[{l:"Continue",c:"pp",fn:function(){advTurn(s);}}]);push(s);return;}
    if(pl.isAI){
      if(pl.aiDiff==="easy"?Math.random()<0.5:true){
        var nc=(u.completedTasks||[]).concat(["boat"]);
        s.players[s.curIdx]=mg(u,{money:u.money-boat.price,boat:boat,inTask:null,taskPos:-1,pos:TASKS.boat.exitIdx,completedTasks:nc});
        addL(s,"AI buys "+boat.name+"!");push(s);advTurn(s);
      } else {push(s);advTurn(s);}
      return;
    }
    var sc6=dc(s);
    showP(boat.name+" $"+boat.price,"info","Price: $"+boat.price+" | Balance: $"+u.money,[
      {l:"Buy $"+boat.price,c:"pp",fn:function(){
        var s2=dc(GS),pu=s2.players[s2.curIdx];
        var nc2=(pu.completedTasks||[]).filter(function(x){return x!=="boat";}).concat(["boat"]);
        s2.players[s2.curIdx]=mg(pu,{money:pu.money-boat.price,boat:boat,inTask:null,taskPos:-1,pos:TASKS.boat.exitIdx,completedTasks:nc2});
        addL(s2,pu.name+" buys "+boat.name+"!");push(s2);advTurn(s2);
      }},
      {l:"Pass",c:"pn",fn:function(){advTurn(dc(GS));}}
    ]);
    push(s);
  }

  function doWin(pl,s,r){
    var cp=pl.winPos<0?-1:pl.winPos,MAX=3,tg=cp+r;
    if(!pl.fasttrack&&tg>MAX){
      showP("Overshot!","info","Need exactly "+(MAX-Math.max(cp,0))+" to reach WIN.\nStay put!",[{l:"OK",c:"pp",fn:function(){advTurn(s);}}]);return;
    }
    var nwp=Math.min(tg,MAX),u=WDOCK[nwp].eff(mg(pl,{winPos:nwp}));
    if(WDOCK[nwp].win){
      if(u.money<0){s.players[s.curIdx]=u;push(s);showP("Still in Debt!","debt","Cannot win with $"+u.money+"!",[{l:"Dang!",c:"pp",fn:function(){advTurn(s);}}]);return;}
      u=mg(u,{done:true});s.players[s.curIdx]=u;s.winner=u;push(s);showWin(u);return;
    }
    var wl=["Dock 1","Lose Turn","Back 1"];
    addL(s,pl.name+" Dock -> "+(wl[nwp]||""));
    s.players[s.curIdx]=u;
    var sc7=dc(s);
    showP("Winners Dock","info",(wl[nwp]||"")+"!\n"+(nwp===1?"Lose next turn.":nwp===2?"Go back 1.":"At entrance."),[{l:"Continue",c:"pp",fn:function(){advTurn(sc7);}}]);
    push(s);
  }

  function advTurn(s){
    var np=[];
    for(var i=0;i<s.players.length;i++){
      var pl=s.players[i];if(!pl){np.push(pl);continue;}
      if(pl.done||pl.eliminated){np.push(pl);continue;}
      if(pl.money<=-1000){addL(s,pl.name+" eliminated!");np.push(mg(pl,{eliminated:true,done:true}));}
      else np.push(pl);
    }
    s.players=np;
    var active=np.filter(function(p){return p&&!p.done;});
    if(active.length<=1){
      var w=active[0]||np[0];var wi=np.indexOf(w);
      if(wi>=0)np[wi]=mg(w,{done:true});
      s.players=np;s.winner=w;push(s);showWin(w);return;
    }
    var next=(s.curIdx+1)%np.length,its=0;
    while((!np[next]||np[next].done)&&its<np.length){next=(next+1)%np.length;its++;}
    np[next]=mg(np[next],{boughtCardThisTurn:false,usedShipwreckThisTurn:false,cardsBoughtThisTurn:[]});
    s.players=np;s.curIdx=next;s.phase="transition";
    push(s);showTrans();
  }

  // ── AI ─────────────────────────────────────────────────────────────────────
  function runAI(){
    if(!GS)return;
    var s=dc(GS),pl=s.players[s.curIdx];
    if(!pl||!pl.isAI)return;
    if(!pl.boughtCardThisTurn&&pl.money>20&&pl.heldCards.length<3){
      var deck=(s.swDeck||[]).slice();if(!deck.length)deck=mkDeck(SWDEFS);
      var card=deck[0],uid=Math.random().toString(36).slice(2);
      deck=deck.slice(1);s.swDeck=deck;
      pl.heldCards=(pl.heldCards||[]).concat([mg(card,{uid:uid})]);
      pl.money-=10;pl.boughtCardThisTurn=true;
      pl.cardsBoughtThisTurn=(pl.cardsBoughtThisTurn||[]).concat([uid]);
      if(card.type==="fasttrack")pl.fasttrack=true;
      addL(s,"AI buys "+card.label);
    }
    s.players[s.curIdx]=pl;
    var r=Math.ceil(Math.random()*6);
    addL(s,"AI rolls "+r);s.phase="rolling";
    push(s);processRoll(r,s);
  }

  // ── Cards ───────────────────────────────────────────────────────────────────
  function buyCard(){
    if(!GS)return;
    var s=dc(GS),pl=s.players[s.curIdx];
    if(pl.boughtCardThisTurn)return;
    var deck=(s.swDeck||[]).slice();if(!deck.length)deck=mkDeck(SWDEFS);
    var card=deck[0],uid=Math.random().toString(36).slice(2);
    deck=deck.slice(1);s.swDeck=deck;
    pl.heldCards=(pl.heldCards||[]).concat([mg(card,{uid:uid})]);
    pl.money-=10;pl.boughtCardThisTurn=true;
    pl.cardsBoughtThisTurn=(pl.cardsBoughtThisTurn||[]).concat([uid]);
    if(card.type==="fasttrack")pl.fasttrack=true;
    s.players[s.curIdx]=pl;
    addL(s,pl.name+" buys "+card.label);
    push(s);
    showP(card.icon+" "+card.label,"info",card.desc+(card.type==="fasttrack"?"\nAlready active!":"\nCan play next turn."),[{l:"Got it!",c:"pp",fn:hideP}]);
  }

  function openCard(idx){
    if(!GS)return;
    var pl=GS.players[GS.curIdx];
    if(pl.usedShipwreckThisTurn){showP("One Per Turn","info","Only one card per turn.",[{l:"OK",c:"pp",fn:hideP}]);return;}
    var card=pl.heldCards[idx];
    if(!card)return;
    if((pl.cardsBoughtThisTurn||[]).indexOf(card.uid)>=0){showP("Cannot Play Yet","info","Play next turn.",[{l:"OK",c:"pp",fn:hideP}]);return;}
    if(card.type==="double"){execCard(card,idx);return;}
    showP(card.icon+" "+card.label,"info",card.desc,[
      {l:"Play Now",c:"pp",fn:function(){hideP();execCard(card,idx);}},
      {l:"Save for Later",c:"pn",fn:hideP}
    ]);
  }

  function execCard(card,idx){
    var s=dc(GS),pl=s.players[s.curIdx];
    pl.heldCards=pl.heldCards.filter(function(_,i){return i!==idx;});
    pl.usedShipwreckThisTurn=true;
    s.players[s.curIdx]=pl;
    if(card.type==="double"){
      pl.doubleRollsLeft=(pl.doubleRollsLeft||0)+2;s.players[s.curIdx]=pl;push(s);
      showP("Double Time!","info","2 bonus rolls this turn!",[{l:"Roll!",c:"pp",fn:hideP}]);return;
    }
    if(card.type==="fasttrack"){pl.fasttrack=true;s.players[s.curIdx]=pl;push(s);return;}
    if(card.type==="shortcut"){
      push(s);
      showP("Shortcut","info","Reduce which challenge?",[
        {l:"Fish (10 to 6)",c:"pp",fn:function(){var s2=dc(GS);s2.players[s2.curIdx].shortcut.fish=true;push(s2);hideP();}},
        {l:"Rescues (2 to 1)",c:"pp",fn:function(){var s2=dc(GS);s2.players[s2.curIdx].shortcut.rescues=true;push(s2);hideP();}},
        {l:"Stars (3 to 2)",c:"pp",fn:function(){var s2=dc(GS);s2.players[s2.curIdx].shortcut.stars=true;push(s2);hideP();}}
      ]);return;
    }
    if(card.type==="teleport"){push(s);doTeleport();return;}
    if(card.type==="freeze"){
      var others=s.players.filter(function(p,i){return i!==s.curIdx&&p&&!p.done;});
      push(s);
      showP("Freeze Frame","info","Choose a player to freeze:",others.map(function(op){
        return {l:op.name,c:"pp",fn:(function(opid){return function(){
          var s2=dc(GS);
          for(var i=0;i<s2.players.length;i++){
            if(s2.players[i]&&s2.players[i].id===opid){s2.players[i]=mg(s2.players[i],{frozen:2,frozenBy:pl.name});break;}
          }
          push(s2);hideP();
        };})(op.id)};
      }));return;
    }
    if(card.type==="robbery"){
      var others2=s.players.filter(function(p,i){return i!==s.curIdx&&p&&!p.done;});
      push(s);
      showP("Highway Robbery","info","Steal ALL money from:",others2.map(function(op){
        return {l:op.name+" ($"+op.money+")",c:"pp",fn:(function(opid){return function(){
          var s2=dc(GS),stolen=0;
          for(var i=0;i<s2.players.length;i++){
            if(s2.players[i]&&s2.players[i].id===opid){stolen=s2.players[i].money;s2.players[i]=mg(s2.players[i],{money:0});break;}
          }
          s2.players[s2.curIdx]=mg(s2.players[s2.curIdx],{money:s2.players[s2.curIdx].money+stolen});
          addL(s2,s2.players[s2.curIdx].name+" robs $"+stolen);push(s2);hideP();
        };})(op.id)};
      }));return;
    }
  }

  function doTeleport(){
    for(var i=0;i<36;i++){
      var k=sKind(i);
      if(k!=="entry_winner"&&i!==0){
        (function(si){
          var el=document.getElementById("sp"+si);
          if(el){
            el.style.cursor="pointer";
            el.addEventListener("click",function h(){
              el.removeEventListener("click",h);
              var s=dc(GS);
              s.players[s.curIdx]=mg(s.players[s.curIdx],{pos:si,inTask:null,taskPos:-1});
              addL(s,s.players[s.curIdx].name+" teleports to space "+si);
              push(s);advTurn(s);
            });
          }
        })(i);
      }
    }
  }

  function debtR(){
    if(!GS)return;
    var pl=GS.players[GS.curIdx];
    if(!pl.completedTasks||!pl.completedTasks.length){showP("Debt Relief","debt","No challenges to sacrifice.",[{l:"Close",c:"pp",fn:hideP}]);return;}
    var lbls={boat_school:"Boat School",boat:"Boat Store",fish:"Catch a Fish",rescue:"Rescues"};
    showP("Debt Relief","debt","Sacrifice a challenge to reset to $0:",
      pl.completedTasks.map(function(tk){
        return {l:lbls[tk]||tk,c:"pw",fn:(function(ttk){return function(){
          var s=dc(GS);
          var p2=mg(s.players[s.curIdx],{money:0,completedTasks:s.players[s.curIdx].completedTasks.filter(function(x){return x!==ttk;})});
          if(ttk==="boat_school")p2=mg(p2,{graduated:false,stars:0});
          if(ttk==="fish")p2=mg(p2,{fish:0});
          if(ttk==="rescue")p2=mg(p2,{rescues:0});
          if(ttk==="boat")p2=mg(p2,{boat:null});
          s.players[s.curIdx]=p2;addL(s,p2.name+" debt relief: "+ttk);push(s);hideP();
        };})(tk)};
      }).concat([{l:"Cancel",c:"pn",fn:hideP}])
    );
  }

  function inspP(i){
    if(!GS)return;
    var pl=GS.players[i];if(!pl)return;
    var tks=["boat_school","boat","fish","rescue"],lines="$"+pl.money+(pl.money<0?" (in debt)":"")+"\n\n";
    for(var j=0;j<tks.length;j++){
      var tk=tks[j],done=(pl.completedTasks||[]).indexOf(tk)>=0,t=TASKS[tk];if(!t)continue;
      lines+=(done?"[done] ":"[    ] ")+t.label+": "+(done?(tk==="boat"?(pl.boat?pl.boat.name:"?"):t.done||"done"):t.prog(pl))+"\n";
    }
    showP(pl.name,"info",lines,[{l:"Close",c:"pp",fn:hideP}]);
  }

  // ── Transition overlay ──────────────────────────────────────────────────────
  function showTrans(){
    if(!GS)return;
    var cur=GS.players[GS.curIdx];if(!cur)return;
    document.getElementById("trsub").textContent=cur.isAI?"AI TURN":"NEXT UP";
    document.getElementById("trdot").style.background=cur.color;
    document.getElementById("trdot").style.boxShadow="0 0 20px "+cur.color;
    document.getElementById("trname").textContent=cur.name+"s Turn";
    document.getElementById("trstats").textContent="$"+cur.money+" | "+(cur.completedTasks||[]).length+"/4";
    var mine=!isMulti||GS.curIdx===myId;
    document.getElementById("trBtn").style.display=(cur.isAI||!mine)?"none":"block";
    document.getElementById("tro").classList.add("on");
    if(cur.isAI){
      setTimeout(function(){
        document.getElementById("tro").classList.remove("on");
        var s=dc(GS);s.phase="preturn";push(s);setTimeout(runAI,400);
      },1800);
    }
  }

  function disTrans(){
    document.getElementById("tro").classList.remove("on");
    if(GS&&GS.phase==="transition"){var s=dc(GS);s.phase="preturn";push(s);}
  }

  // ── Popup ───────────────────────────────────────────────────────────────────
  var ACOLS={swim:"#1565c0",sink:"#b71c1c",debt:"#c0392b",info:"#1a3a55",success:"#1a7a3a"};
  function showP(title,accent,body,btns){
    document.getElementById("phd").style.background=ACOLS[accent]||"#1a3a55";
    document.getElementById("phd").innerHTML='<div style="font-size:18px;font-weight:700;color:#fff">'+title+'</div>';
    document.getElementById("pbd").textContent=body;
    var f=document.getElementById("pft");f.innerHTML="";
    (btns||[]).forEach(function(b){
      var btn=document.createElement("button");
      btn.textContent=b.l;btn.className=b.c||"pn";
      btn.onclick=function(){hideP();if(b.fn)b.fn();};
      f.appendChild(btn);
    });
    document.getElementById("po").classList.add("on");
  }
  function hideP(){document.getElementById("po").classList.remove("on");}

  function showWin(player){
    document.getElementById("wemoji").textContent=player.isAI?"AI WIN":"YOU WIN";
    document.getElementById("wname").textContent=player.name;
    document.getElementById("wname").style.color=player.color;
    document.getElementById("wo").classList.add("on");
  }

  // ── Zoom / scroll ───────────────────────────────────────────────────────────
  var ZL=[0.5,0.65,0.8,1.0,1.2,1.5,1.8];
  function zoomIn(){scale=ZL[Math.min(ZL.indexOf(scale)+1,ZL.length-1)];applyScale();}
  function zoomOut(){scale=ZL[Math.max(ZL.indexOf(scale)-1,0)];applyScale();}
  function applyScale(){
    var w=document.getElementById("bwrap"),s=document.getElementById("bs");
    w.style.transform="scale("+scale+")";w.style.width=BW+"px";w.style.height=BH+"px";
    s.style.minWidth=(BW*scale)+"px";s.style.minHeight=(BH*scale)+"px";
    document.getElementById("zlbl").textContent=Math.round(scale*100)+"%";
  }
  function ctrOn(){
    if(!GS)return;
    var pl=GS.players[GS.curIdx];if(!pl)return;
    var xy=pXY(pl);
    var s=document.getElementById("bs");
    s.scrollLeft=xy.x*scale-s.clientWidth/2;
    s.scrollTop=xy.y*scale-s.clientHeight/2;
  }

  // ── Wire up buttons ─────────────────────────────────────────────────────────
  document.getElementById("btnCreate").addEventListener("click",createRoom);
  document.getElementById("btnJoin").addEventListener("click",joinRoom);
  document.getElementById("btnSolo").addEventListener("click",startSolo);
  document.getElementById("btnLeave").addEventListener("click",leaveGame);
  document.getElementById("btnPause").addEventListener("click",function(){paused=!paused;document.getElementById("btnPause").textContent=paused?"Resume":"Pause";});
  document.getElementById("btnZI").addEventListener("click",zoomIn);
  document.getElementById("btnZO").addEventListener("click",zoomOut);
  document.getElementById("btnCtr").addEventListener("click",ctrOn);
  document.getElementById("btnWL").addEventListener("click",leaveGame);
  document.getElementById("trBtn").addEventListener("click",disTrans);
  document.getElementById("ji").addEventListener("keydown",function(e){if(e.key==="Enter")joinRoom();});

  console.log("Boat Ride 2.0 ready!");

} // end boot()

// Firebase is already loaded via script tags above
window.addEventListener("DOMContentLoaded", function(){
  boot(dbSet, dbGet, dbOn);
});
</script>
</body>
</html>
